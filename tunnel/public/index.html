<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>👨‍💼 Admin Portal — MindSeeds Fees (LOCAL)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            padding: 20px;
        }

        h1 {
            color: #38bdf8;
            margin-bottom: 5px;
        }

        .subtitle {
            color: #94a3b8;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .badge {
            background: #22c55e;
            color: white;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        .badge.offline {
            background: #ef4444;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
        }

        .card {
            background: #1e293b;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #334155;
        }

        .card h2 {
            color: #f8fafc;
            margin-bottom: 15px;
            font-size: 18px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 8px;
            color: #94a3b8;
            border-bottom: 1px solid #334155;
            font-size: 13px;
        }

        td {
            padding: 8px;
            border-bottom: 1px solid #1e293b;
            font-size: 14px;
        }

        .status {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status.paid {
            background: #166534;
            color: #4ade80;
        }

        .status.pending {
            background: #854d0e;
            color: #fbbf24;
        }

        .status.overdue {
            background: #991b1b;
            color: #f87171;
        }

        .status.partial_paid {
            background: #581c87;
            color: #c084fc;
        }

        .status.called {
            background: #166534;
            color: #4ade80;
        }

        button {
            padding: 6px 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
        }

        .btn-call {
            background: #f59e0b;
            color: #000;
        }

        .btn-call:hover {
            background: #d97706;
        }

        .btn-pay {
            background: #22c55e;
            color: white;
        }

        .btn-pay:hover {
            background: #16a34a;
        }

        .amount {
            color: #38bdf8;
            font-weight: 600;
        }

        .call-list {
            margin-top: 10px;
        }

        .call-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #0f172a;
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .call-item .name {
            font-weight: 600;
            color: #f8fafc;
        }

        .call-item .phone {
            color: #94a3b8;
        }

        .call-item .reason {
            color: #fbbf24;
            font-size: 13px;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #22c55e;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>

<body>
    <h1>👨‍💼 Admin Portal — Fees Management</h1>
    <p class="subtitle">🏠 Running LOCALLY on your PC | Data: <code>fees.db</code> (your hard drive) | <span
            id="dbStatus" class="badge">● Online</span></p>

    <div class="grid">
        <!-- Students & Fees -->
        <div class="card">
            <h2>📋 Students & Fees</h2>
            <table>
                <thead>
                    <tr>
                        <th>Student</th>
                        <th>Phone</th>
                        <th>Total Fee</th>
                        <th>Paid</th>
                        <th>Overdue</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="studentList"></tbody>
            </table>
        </div>

        <!-- Call Requests -->
        <div class="card">
            <h2>📞 Call Requests (sent to Receptionist)</h2>
            <div id="callRequests" class="call-list"></div>
            <h3 style="margin-top:20px; color:#94a3b8;">✅ Called (Done)</h3>
            <div id="calledList" class="call-list" style="margin-top:10px;"></div>
        </div>
    </div>

    <!-- Student Fee Details -->
    <div class="grid" style="margin-top:20px;">
        <div class="card" id="feeDetails" style="grid-column: span 2; display:none;">
            <h2 id="feeStudentName">Installments</h2>
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Amount</th>
                        <th>Paid</th>
                        <th>Due Date</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="installmentList"></tbody>
            </table>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        const API = '';

        function toast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.style.display = 'block';
            setTimeout(() => t.style.display = 'none', 3000);
        }

        async function loadStudents() {
            const res = await fetch(`${API}/api/fees/students`);
            const { data } = await res.json();
            document.getElementById('studentList').innerHTML = data.map(s => `
        <tr>
          <td>${s.name}</td>
          <td>${s.parentPhone}</td>
          <td class="amount">₹${s.totalFee.toLocaleString()}</td>
          <td class="amount">₹${(s.totalPaid || 0).toLocaleString()}</td>
          <td>${s.overdueCount > 0 ? `<span class="status overdue">${s.overdueCount} overdue</span>` : '✅'}</td>
          <td>
            <button class="btn-call" onclick="createCallRequest(${s.id})">📞 Call</button>
            <button class="btn-pay" onclick="showFees(${s.id}, '${s.name}')">📋 Fees</button>
          </td>
        </tr>
      `).join('');
        }

        async function showFees(studentId, name) {
            const res = await fetch(`${API}/api/fees/student/${studentId}`);
            const { data } = await res.json();
            document.getElementById('feeDetails').style.display = 'block';
            document.getElementById('feeStudentName').textContent = `📋 ${name} — Installments`;
            document.getElementById('installmentList').innerHTML = data.map(f => `
        <tr>
          <td>#${f.installmentNumber}</td>
          <td class="amount">₹${f.amount.toLocaleString()}</td>
          <td>₹${(f.paidAmount || 0).toLocaleString()}</td>
          <td>${f.dueDate}</td>
          <td><span class="status ${f.status}">${f.status}</span></td>
          <td>
            ${f.status === 'pending' || f.status === 'overdue'
                    ? `<button class="btn-pay" onclick="payFee(${f.id}, ${f.amount})">💰 Full</button>
                 <button class="btn-call" onclick="partialPay(${f.id})">💸 Partial</button>`
                    : '—'}
          </td>
        </tr>
      `).join('');
        }

        async function payFee(feeId, amount) {
            await fetch(`${API}/api/fees/${feeId}/pay`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount }),
            });
            toast('✅ Full payment recorded!');
            loadStudents();
        }

        async function partialPay(feeId) {
            const amount = prompt('Enter partial amount paid (₹):');
            if (!amount) return;
            const res = await fetch(`${API}/api/fees/${feeId}/pay`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: parseFloat(amount) }),
            });
            const data = await res.json();
            toast(data.message);
            loadStudents();
        }

        async function createCallRequest(studentId) {
            await fetch(`${API}/api/call-requests`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ studentId, reason: 'Fee follow-up' }),
            });
            toast('📞 Call request sent to receptionist!');
            loadCallRequests();
        }

        async function loadCallRequests() {
            const res1 = await fetch(`${API}/api/call-requests?status=pending`);
            const { data: pending } = await res1.json();
            document.getElementById('callRequests').innerHTML = pending.length === 0
                ? '<p style="color:#94a3b8">No pending call requests</p>'
                : pending.map(c => `
          <div class="call-item">
            <div>
              <div class="name">${c.studentName}</div>
              <div class="phone">📱 ${c.parentPhone}</div>
              <div class="reason">${c.reason}</div>
            </div>
            <span class="status pending">⏳ Waiting for receptionist</span>
          </div>
        `).join('');

            const res2 = await fetch(`${API}/api/call-requests?status=called`);
            const { data: called } = await res2.json();
            document.getElementById('calledList').innerHTML = called.length === 0
                ? '<p style="color:#94a3b8">No calls done yet</p>'
                : called.map(c => `
          <div class="call-item">
            <div>
              <div class="name">${c.studentName}</div>
              <div class="phone">📱 ${c.parentPhone}</div>
            </div>
            <span class="status called">✅ Called at ${c.calledAt}</span>
          </div>
        `).join('');
        }

        loadStudents();
        loadCallRequests();
        setInterval(() => { loadStudents(); loadCallRequests(); }, 5000);
    </script>
</body>

</html>
